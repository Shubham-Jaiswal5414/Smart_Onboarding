# OpenMetadata Quick Start
# Run: docker compose up -d
# Wait ~3 mins, then open http://localhost:8585
# Login: admin / admin

version: "3.8"

volumes:
  ingestion-volume-dag-airflow:
  ingestion-volume-dags:
  ingestion-volume-tmp:

services:
  mysql:
    image: mysql:8.0
    container_name: openmetadata_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: openmetadata_db
      MYSQL_USER: openmetadata_user
      MYSQL_PASSWORD: openmetadata_password
    expose:
      - 3306

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.16.3
    container_name: openmetadata_elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    expose:
      - 9200
      - 9300

  openmetadata-server:
    image: openmetadata/server:1.3.0
    container_name: openmetadata_server
    environment:
      MYSQL_USER_NAME: openmetadata_user
      MYSQL_USER_PASSWORD: openmetadata_password
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: openmetadata_db
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      SERVER_PORT: 8585
    ports:
      - "8585:8585"
    depends_on:
      - mysql
      - elasticsearch
